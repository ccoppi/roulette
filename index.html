<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Roulette Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --surf: #1e293b;
            --neon: #00d4ff;
            --gold: #fcc200;
            --red: #ff4d4d;
            --black: #000000;
            --green: #22c55e;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        #game-container {
            width: 100%;
            max-width: 420px;
            background: var(--surf);
            padding: 15px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            box-sizing: border-box;
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 0 10px;
            font-weight: 800;
            font-size: 1.1rem;
        }

        /* --- RUOTA --- */
        .wheel-container {
            width: 140px;
            height: 140px;
            margin: 5px auto;
            border-radius: 50%;
            border: 4px solid var(--neon);
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        #wheel-number {
            font-size: 3.5rem;
            font-weight: 900;
            text-shadow: 0 0 10px var(--neon);
            transition: color 0.2s;
        }

        .spinning { animation: spinFX 0.1s linear infinite; }
        @keyframes spinFX {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* --- SELETTORE PUNTATA (NUOVO) --- */
        .chip-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .chip {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px dashed rgba(255,255,255,0.3);
            background: none;
            color: white;
            font-weight: 900;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .chip.active {
            border-color: white;
            transform: scale(1.2);
            box-shadow: 0 0 15px var(--gold);
            border-style: solid;
            color: var(--gold);
        }

        /* --- TABELLONE --- */
        .betting-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .bet-btn {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 5px;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .bet-btn.selected { 
            border: 2px solid var(--neon); 
            background: rgba(0, 212, 255, 0.2);
            box-shadow: inset 0 0 10px var(--neon);
        }

        .red { background: var(--red); }
        .black { background: var(--black); }
        .green { background: var(--green); grid-column: span 2; }

        #spin-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--neon), #00a8ff);
            color: var(--bg);
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }

        #spin-btn:disabled { opacity: 0.3; filter: grayscale(1); }

        #last-nums {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 10px 0;
            height: 28px;
        }

        .history-ball {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <h1 style="color:var(--neon); margin: 10px 0; font-size: 1.6rem; letter-spacing: 1px;">NEON ROULETTE</h1>

    <div id="game-container">
        <div class="stats">
            <div style="color:var(--gold)">💰 <span id="balance">100</span></div>
            <div style="color:var(--neon)">PUNTATA: <span id="display-bet">10</span></div>
        </div>

        <div class="wheel-container">
            <div id="wheel-number">0</div>
        </div>

        <div id="last-nums"></div>

        <div id="msg" style="margin: 10px 0; font-weight: bold; height: 20px; font-size: 0.9rem;">Scegli la fiche e punta!</div>

        <div class="chip-selector">
            <button class="chip" onclick="setChip(5)">5</button>
            <button class="chip active" onclick="setChip(10)">10</button>
            <button class="chip" onclick="setChip(25)">25</button>
            <button class="chip" onclick="setChip(50)">50</button>
        </div>

        <div class="betting-board">
            <button class="bet-btn red" onclick="setBetType('RED', this)">ROSSO</button>
            <button class="bet-btn black" onclick="setBetType('BLACK', this)">NERO</button>
            <button class="bet-btn" onclick="setBetType('EVEN', this)">PARI</button>
            <button class="bet-btn" onclick="setBetType('ODD', this)">DISPARI</button>
            <button class="bet-btn" onclick="setBetType('1-18', this)">1-18</button>
            <button class="bet-btn" onclick="setBetType('19-36', this)">19-36</button>
            <button class="bet-btn green" onclick="setBetType('0', this)">NUMERO ZERO (x36)</button>
        </div>

        <button id="spin-btn" onclick="play()">Gira la Ruota</button>
        <button id="reload-btn" style="background:var(--red); color:white; display:none; border:none; padding:18px; border-radius:14px; font-weight:900; width:100%;" onclick="reload()">RICARICA 100 MONETE</button>
    </div>

<script>
    let balance = 100;
    let selectedBetValue = 10;
    let selectedBetType = null;
    let isSpinning = false;
    const redNumbers = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

    function setChip(val) {
        if(isSpinning) return;
        selectedBetValue = val;
        document.getElementById('display-bet').innerText = val;
        document.querySelectorAll('.chip').forEach(c => {
            c.classList.toggle('active', parseInt(c.innerText) === val);
        });
    }

    function setBetType(type, btn) {
        if(isSpinning) return;
        selectedBetType = type;
        document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('msg').innerText = "Puntati " + selectedBetValue + " su " + type;
        document.getElementById('msg').style.color = "white";
    }

    function play() {
        if(!selectedBetType) return alert("Scegli dove puntare!");
        if(balance < selectedBetValue) return alert("Saldo insufficiente!");

        balance -= selectedBetValue;
        isSpinning = true;
        updateUI();

        const numEl = document.getElementById('wheel-number');
        const spinBtn = document.getElementById('spin-btn');
        
        numEl.classList.add('spinning');
        spinBtn.disabled = true;
        document.getElementById('msg').innerText = "La pallina corre...";

        const timer = setInterval(() => {
            numEl.innerText = Math.floor(Math.random() * 37);
        }, 60);

        setTimeout(() => {
            clearInterval(timer);
            numEl.classList.remove('spinning');
            
            const result = Math.floor(Math.random() * 37);
            numEl.innerText = result;
            
            // Colore numero finale
            if(result === 0) numEl.style.color = "var(--green)";
            else if(redNumbers.includes(result)) numEl.style.color = "var(--red)";
            else numEl.style.color = "white";

            checkWin(result);
            isSpinning = false;
            spinBtn.disabled = false;
            addHistory(result);
            updateUI();
        }, 2000);
    }

    function checkWin(res) {
        let win = 0;
        const isRed = redNumbers.includes(res);
        const isBlack = res !== 0 && !isRed;

        if(selectedBetType === '0' && res === 0) win = selectedBetValue * 36;
        else if(selectedBetType === 'RED' && isRed) win = selectedBetValue * 2;
        else if(selectedBetType === 'BLACK' && isBlack) win = selectedBetValue * 2;
        else if(selectedBetType === 'EVEN' && res !== 0 && res % 2 === 0) win = selectedBetValue * 2;
        else if(selectedBetType === 'ODD' && res % 2 !== 0) win = selectedBetValue * 2;
        else if(selectedBetType === '1-18' && res >= 1 && res <= 18) win = selectedBetValue * 2;
        else if(selectedBetType === '19-36' && res >= 19 && res <= 36) win = selectedBetValue * 2;

        const msgEl = document.getElementById('msg');
        if(win > 0) {
            balance += win;
            msgEl.innerText = "HAI VINTO " + win + "! 🏆";
            msgEl.style.color = "var(--gold)";
        } else {
            msgEl.innerText = "Niente da fare!";
            msgEl.style.color = "white";
        }
    }

    function addHistory(num) {
        const hist = document.getElementById('last-nums');
        const ball = document.createElement('div');
        ball.className = 'history-ball';
        ball.innerText = num;
        if(num === 0) ball.style.background = "var(--green)";
        else if(redNumbers.includes(num)) ball.style.background = "var(--red)";
        else ball.style.background = "black";
        
        hist.prepend(ball);
        if(hist.children.length > 7) hist.removeChild(hist.lastChild);
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance;
        if(balance < 5 && !isSpinning) {
            document.getElementById('spin-btn').style.display = 'none';
            document.getElementById('reload-btn').style.display = 'block';
        } else {
            document.getElementById('spin-btn').style.display = 'block';
            document.getElementById('reload-btn').style.display = 'none';
        }
    }

    function reload() {
        balance = 100;
        updateUI();
        document.getElementById('msg').innerText = "Ricaricato! 💰";
    }

    updateUI();
</script>
</body>
</html>
