<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Roulette</title>
    <style>
        :root {
            --bg: #0f172a;
            --surf: #1e293b;
            --neon: #00d4ff;
            --gold: #fcc200;
            --red: #ff4d4d;
            --black: #000000;
            --green: #22c55e;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        #game-container {
            width: 100%;
            max-width: 400px;
            background: var(--surf);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
            text-align: center;
        }

        /* --- RUOTA NEON --- */
        .wheel-container {
            width: 150px;
            height: 150px;
            margin: 10px auto;
            border-radius: 50%;
            border: 5px solid var(--neon);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: black;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        #wheel-number {
            font-size: 3.5rem;
            font-weight: 900;
            text-shadow: 0 0 10px var(--neon);
        }

        .spinning { animation: spinColor 0.1s linear infinite; }
        @keyframes spinColor {
            0% { color: var(--red); transform: scale(1); }
            50% { color: var(--neon); transform: scale(1.1); }
            100% { color: var(--gold); transform: scale(1); }
        }

        /* --- TAPPETO DA GIOCO --- */
        .betting-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 20px 0;
        }

        .bet-btn {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 5px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .bet-btn.selected { border: 2px solid var(--neon); background: rgba(0, 212, 255, 0.2); }
        .red { background: var(--red); }
        .black { background: var(--black); }
        .green { background: var(--green); grid-column: span 2; }

        .controls { display: flex; flex-direction: column; gap: 10px; }
        
        #spin-btn {
            background: var(--neon);
            color: var(--bg);
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        #spin-btn:disabled { opacity: 0.3; }

        .stats { display: flex; justify-content: space-between; font-weight: 800; margin-bottom: 10px; }
        
        #last-numbers {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 10px;
            height: 25px;
        }

        .history-ball {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 style="color:var(--neon); font-size: 1.5rem;">NEON ROULETTE</h1>

    <div id="game-container">
        <div class="stats">
            <div style="color:var(--gold)">💰 <span id="balance">100</span></div>
            <div style="color:var(--neon)">PUNTA: 10</div>
        </div>

        <div class="wheel-container">
            <div id="wheel-number">0</div>
        </div>

        <div id="last-numbers"></div>

        <div id="msg" style="margin: 10px 0; font-weight: bold; height: 20px;">Scegli dove puntare!</div>

        <div class="betting-board">
            <button class="bet-btn red" onclick="selectBet('RED', this)">ROSSO</button>
            <button class="bet-btn black" onclick="selectBet('BLACK', this)">NERO</button>
            <button class="bet-btn" onclick="selectBet('EVEN', this)">PARI</button>
            <button class="bet-btn" onclick="selectBet('ODD', this)">DISPARI</button>
            <button class="bet-btn" onclick="selectBet('1-18', this)">1-18</button>
            <button class="bet-btn" onclick="selectBet('19-36', this)">19-36</button>
            <button class="bet-btn green" onclick="selectBet('0', this)">ZERO (x36)</button>
        </div>

        <div class="controls">
            <button id="spin-btn" onclick="play()">GIRA LA RUOTA</button>
            <button id="reload-btn" style="background:var(--red); color:white; display:none; border:none; padding:15px; border-radius:12px; font-weight:bold;" onclick="reload()">RICARICA 100</button>
        </div>
    </div>

<script>
    let balance = 100;
    let currentBetType = null;
    let isSpinning = false;
    const betAmount = 10;

    const redNumbers = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

    function selectBet(type, btn) {
        if(isSpinning) return;
        currentBetType = type;
        document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('msg').innerText = "Hai puntato su: " + type;
    }

    function play() {
        if(!currentBetType) return alert("Seleziona prima una puntata!");
        if(balance < betAmount) return;

        balance -= betAmount;
        isSpinning = true;
        updateUI();

        const numEl = document.getElementById('wheel-number');
        const spinBtn = document.getElementById('spin-btn');
        
        numEl.classList.add('spinning');
        spinBtn.disabled = true;
        document.getElementById('msg').innerText = "La pallina gira...";

        // Animazione della ruota
        let duration = 2000;
        let startTime = Date.now();
        
        const timer = setInterval(() => {
            numEl.innerText = Math.floor(Math.random() * 37);
        }, 50);

        setTimeout(() => {
            clearInterval(timer);
            numEl.classList.remove('spinning');
            
            const result = Math.floor(Math.random() * 37);
            numEl.innerText = result;
            
            // Colore del numero
            if(result === 0) numEl.style.color = "var(--green)";
            else if(redNumbers.includes(result)) numEl.style.color = "var(--red)";
            else numEl.style.color = "white";

            checkWin(result);
            isSpinning = false;
            spinBtn.disabled = false;
            addHistory(result);
            updateUI();
        }, duration);
    }

    function checkWin(res) {
        let win = 0;
        const msgEl = document.getElementById('msg');
        const isRed = redNumbers.includes(res);
        const isBlack = res !== 0 && !isRed;

        if(currentBetType === '0' && res === 0) win = betAmount * 36;
        else if(currentBetType === 'RED' && isRed) win = betAmount * 2;
        else if(currentBetType === 'BLACK' && isBlack) win = betAmount * 2;
        else if(currentBetType === 'EVEN' && res !== 0 && res % 2 === 0) win = betAmount * 2;
        else if(currentBetType === 'ODD' && res % 2 !== 0) win = betAmount * 2;
        else if(currentBetType === '1-18' && res >= 1 && res <= 18) win = betAmount * 2;
        else if(currentBetType === '19-36' && res >= 19 && res <= 36) win = betAmount * 2;

        if(win > 0) {
            balance += win;
            msgEl.innerText = "VINCITA: " + win + "!";
            msgEl.style.color = "var(--gold)";
        } else {
            msgEl.innerText = "Hai perso!";
            msgEl.style.color = "white";
        }
    }

    function addHistory(num) {
        const hist = document.getElementById('last-numbers');
        const ball = document.createElement('div');
        ball.className = 'history-ball';
        ball.innerText = num;
        if(num === 0) ball.style.background = "var(--green)";
        else if(redNumbers.includes(num)) ball.style.background = "var(--red)";
        else ball.style.background = "black";
        
        hist.prepend(ball);
        if(hist.children.length > 8) hist.removeChild(hist.lastChild);
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance;
        if(balance < betAmount && !isSpinning) {
            document.getElementById('spin-btn').style.display = 'none';
            document.getElementById('reload-btn').style.display = 'block';
        }
    }

    function reload() {
        balance = 100;
        document.getElementById('spin-btn').style.display = 'block';
        document.getElementById('reload-btn').style.display = 'none';
        updateUI();
    }

    updateUI();
</script>
</body>
</html>
